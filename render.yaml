# Render Blueprint — deploys the Doc-Connect API as a free web service.
# In Render: New + → Blueprint → connect this repo. You'll be prompted for the
# secret env vars marked `sync: false` (MONGO_URI, CLIENT_URL, EMAIL_*).
services:
  - type: web
    name: doc-connect-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false                  # paste your Atlas connection string
      - key: CLIENT_URL
        sync: false                  # set to your Vercel URL after the frontend deploys
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
